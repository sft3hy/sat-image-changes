apiVersion: v1
kind: Service
metadata:
  name: {{ include "sat-image-changes.fullname" . }}-broker
  labels:
    {{- include "sat-image-changes.labels" . | nindent 4 }}
    component: broker
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.broker.service.portBroker }}
      targetPort: broker
      protocol: TCP
      name: broker
  selector:
    {{- include "sat-image-changes.selectorLabels" . | nindent 4 }}
    component: broker
