{{- if .Values.ingress.enabled -}}
{{- $fullName := include "sat-image-changes.fullname" . -}}
{{- $svcPort := .Values.service.portWeb -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "sat-image-changes.labels" .| nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
{{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
{{- end }}
{{- if .Values.ingress.tls }}
  tls:
{{- range .Values.ingress.tls }}
    - hosts:
{{- range .hosts }}
        - {{ . | quote }}
{{- end }}
      {{- if .secretName }}
      secretName: {{ .secretName }}
      {{- end }}
{{- end }}
{{- end }}
  rules:
{{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
{{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ (printf "%s-%s" $fullName .serviceSuffix) | default $fullName }}
                port:
                  number: {{ .backendPort | default $svcPort }}
{{- end }}
{{- end }}
{{- end }}
