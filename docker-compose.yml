services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - DATA_BASE_PATH=/app/data
    volumes:
      - /Users/samueltownsend/Downloads/test:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend

  ispy-broker:
    build:
      context: ./ispy
    ports:
      - "3000:3000"

